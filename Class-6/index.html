<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class-6</title>
  </head>
  <body>
    <h1>Class-6</h1>

    <audio controls>
      <source src="audio.mp3" type="audio/mpeg" />
    </audio>

    <h2>video</h2>
    <video controls width="800" height="300">
      <source src="video.mp4" type="video/mp4" />
    </video>

    <h2>Unorder List</h2>
    <ul type="square">
      <li>Milk</li>
      <li>Tea</li>
      <li>Coffee</li>
    </ul>

    <ol type="A">
      <li>Rahim</li>
      <li>Karim</li>
      <ol>
        <li>Milk</li>
        <li>Tea</li>
      </ol>
    </ol>

    <h2>Description List</h2>
    <dl>
      <dt>Coffee</dt>
      <dd>- black hot drink</dd>
      <dt>Milk</dt>
      <dd>- white cold drink</dd>
    </dl>
  </body>
</html>
